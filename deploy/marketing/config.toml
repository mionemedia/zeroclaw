# ZeroClaw Marketing Research Agent — Hardened Config
workspace_dir = "/zeroclaw-data/workspace"
config_path = "/zeroclaw-data/.zeroclaw/config.toml"

default_provider = "openrouter"
default_model = "anthropic/claude-sonnet-4"
default_temperature = 0.7

# ── Model Routes (hybrid: OpenRouter for quality + Ollama for tasks) ──
# Default: OpenRouter Claude for marketing & book writing (high quality)
# Use hint:<name> to switch models based on task requirements

# ── OpenRouter Routes (premium models for marketing/writing) ──
[[model_routes]]
hint = "book"
provider = "openrouter"
model = "anthropic/claude-sonnet-4"
# Premium writing for book chapters and long-form content

[[model_routes]]
hint = "marketing"
provider = "openrouter"
model = "anthropic/claude-sonnet-4"
# Marketing content, brand strategy, creative campaigns

[[model_routes]]
hint = "deep"
provider = "openrouter"
model = "anthropic/claude-sonnet-4.5"
# Deep reasoning for complex strategic analysis

# ── Ollama Routes (free local models for utility tasks) ──
[[model_routes]]
hint = "code"
provider = "ollama"
model = "qwen2.5-coder:latest"
# 7.6B coding specialist - programming tasks

[[model_routes]]
hint = "reasoning"
provider = "ollama"
model = "MFDoom/deepseek-r1-tool-calling:latest"
# 7.6B tool calling - data analysis and logic

[[model_routes]]
hint = "fast"
provider = "ollama"
model = "gemma3:4b"
# 4.3B lightweight - quick responses and summaries

[[model_routes]]
hint = "draft"
provider = "ollama"
model = "llama3.2"
# Local drafting and brainstorming before premium writing

[[model_routes]]
hint = "brainstorm"
provider = "ollama"
model = "llama3.2"
# Free idea generation, titles, hooks, angles

[[model_routes]]
hint = "outline"
provider = "ollama"
model = "llama3.2"
# Structure planning and content organization

[[model_routes]]
hint = "seo"
provider = "ollama"
model = "MFDoom/deepseek-r1-tool-calling:latest"
# Keyword research and SEO analysis (free)

[[model_routes]]
hint = "final"
provider = "openrouter"
model = "anthropic/claude-sonnet-4"
# Final polish for publication-ready content

[gateway]
port = 3000
host = "[::]"
allow_public_bind = true
require_pairing = true
pair_rate_limit_per_minute = 5
webhook_rate_limit_per_minute = 30

[autonomy]
level = "supervised"
workspace_only = true
require_approval_for_medium_risk = true
block_high_risk_commands = true
max_actions_per_hour = 60
max_cost_per_day_cents = 500
allowed_commands = [
    "ls",
    "cat",
    "head",
    "tail",
    "wc",
    "grep",
    "find",
    "echo",
    "pwd",
]
forbidden_paths = [
    "/etc",
    "/root",
    "/home",
    "/usr",
    "/bin",
    "/sbin",
    "/lib",
    "/opt",
    "/boot",
    "/dev",
    "/proc",
    "/sys",
    "/var",
    "/tmp",
    "~/.ssh",
    "~/.gnupg",
    "~/.aws",
    "~/.config",
]
auto_approve = ["file_read", "memory_recall", "web_search_tool"]
always_ask = []

[web_search]
enabled = true
provider = "duckduckgo"
max_results = 10
timeout_secs = 20

[http_request]
enabled = true
allowed_domains = ["*"]
max_response_size = 1000000
timeout_secs = 30

[memory]
backend = "sqlite"
auto_save = true

[browser]
enabled = false

[composio]
enabled = false

[hardware]
enabled = false

[peripherals]
enabled = false

[secrets]
encrypt = true

[cost]
enabled = true
daily_limit_usd = 5.00
monthly_limit_usd = 50.00
warn_at_percent = 80

[channels_config]
cli = true

[channels_config.telegram]
bot_token = "__TELEGRAM_BOT_TOKEN__"
allowed_users = ["8203092181"]
stream_mode = "partial"
mention_only = false

[observability]
backend = "log"

[agent]
max_tool_iterations = 15
max_history_messages = 50
compact_context = false
parallel_tools = false

[scheduler]
enabled = false

[cron]
enabled = false

[runtime]
kind = "native"
